services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vault_demo
      POSTGRES_PASSWORD: vault_demo_dev
      POSTGRES_DB: vault_core_demo
    # Host 5437 avoids clashing with other local Postgres containers (5432–5436).
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_demo -d vault_core_demo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
