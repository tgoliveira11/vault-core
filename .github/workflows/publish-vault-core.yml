name: Publish vault-core to npm

on:
  push:
    tags:
      - "vault-core-v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Security audit (high/critical)
        run: npm run audit:security

      - name: Validate package version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_VERSION=${GITHUB_REF_NAME#vault-core-v}
          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Package version ($PACKAGE_VERSION) does not match tag version ($EXPECTED_VERSION)"
            exit 1
          fi

      - name: Build package
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Upgrade npm for publishing
        run: npm install -g npm@latest

      - name: Show npm version
        run: npm --version

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag latest
