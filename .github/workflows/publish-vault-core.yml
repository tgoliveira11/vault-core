name: Publish package to npmjs

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact x.y.z version or patch, minor, major; leave blank for changelog-based automatic versioning"
        required: false
        type: string

concurrency:
  group: vault-core-npm-publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npmjs
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout main with tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Install immutable dependencies
        run: npm ci

      - name: Verify npm supports trusted publishing
        run: |
          NPM_VERSION=$(npm --version)
          node -e "const [major, minor] = process.argv[1].split('.').map(Number); if (major < 11 || (major === 11 && minor < 5)) { throw new Error('Trusted publishing requires npm 11.5.1 or newer') }" "$NPM_VERSION"

      - name: Audit all dependencies for high and critical vulnerabilities
        run: npm run audit:security

      - name: Changelog pre-flight (new release vs recovery)
        id: preflight
        env:
          RELEASE_SPEC: ${{ inputs.version }}
        run: |
          node scripts/changelog-preflight.mjs | tee "$RUNNER_TEMP/changelog-preflight.json"
          MODE=$(node -e "process.stdout.write(JSON.parse(require('node:fs').readFileSync(process.argv[1],'utf8')).mode)" "$RUNNER_TEMP/changelog-preflight.json")
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Prepare release version and changelog
        id: release
        env:
          RELEASE_SPEC: ${{ inputs.version }}
        run: node scripts/prepare-release.mjs

      - name: Validate tests, coverage, types, and build
        run: npm run validate

      - name: Build the exact publication tarball
        id: pack
        run: |
          npm pack --json --ignore-scripts > "$RUNNER_TEMP/vault-core-pack.json"
          TARBALL=$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(data[0].filename)" "$RUNNER_TEMP/vault-core-pack.json")
          test -n "$TARBALL"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Check whether npm already has this version
        id: registry
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view "${PACKAGE_NAME}@${RELEASE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Inspect existing release state
        id: state
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_CHANGED: ${{ steps.release.outputs.changed }}
          RECOVERY_MODE: ${{ steps.release.outputs.recovery }}
          ALREADY_PUBLISHED: ${{ steps.registry.outputs.published }}
        run: |
          TAG="vault-core-v${RELEASE_VERSION}"
          if [ "$ALREADY_PUBLISHED" = "true" ] && [ "$RECOVERY_MODE" != "true" ]; then
            echo "npm version ${RELEASE_VERSION} already exists but this is a new release"
            exit 1
          fi
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            if [ "$ALREADY_PUBLISHED" != "true" ]; then
              echo "Tag ${TAG} exists before npm publication; refusing an inconsistent release"
              exit 1
            fi
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push release metadata
        if: steps.release.outputs.changed == 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "Release ${RELEASE_VERSION}"
          git push origin HEAD:main

      - name: Publish the validated tarball to npmjs
        if: steps.registry.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --provenance

      - name: Create and push the release tag
        if: steps.state.outputs.tag_exists == 'false'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="vault-core-v${RELEASE_VERSION}"
          git tag -a "${TAG}" -m "Release ${RELEASE_VERSION}"
          git push origin "${TAG}"

      - name: Create GitHub release notes
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          TAG="vault-core-v${RELEASE_VERSION}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "vault-core ${RELEASE_VERSION}" \
              --generate-notes
          fi

      - name: Verify release invariant (registry, tag, GitHub Release)
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          TAG="vault-core-v${RELEASE_VERSION}"

          for attempt in 1 2 3 4 5; do
            if npm view "${PACKAGE_NAME}@${RELEASE_VERSION}" version >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "npm registry does not yet expose ${PACKAGE_NAME}@${RELEASE_VERSION}"
              exit 1
            fi
            echo "Waiting for npm registry propagation (attempt ${attempt}/5)..."
            sleep 10
          done

          git rev-parse "refs/tags/${TAG}" >/dev/null
          gh release view "${TAG}" >/dev/null
          echo "Release invariant satisfied for ${PACKAGE_NAME}@${RELEASE_VERSION}, tag ${TAG}"

      - name: Publish summary
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_MODE: ${{ steps.preflight.outputs.mode }}
          ALREADY_PUBLISHED: ${{ steps.registry.outputs.published }}
        run: |
          TAG="vault-core-v${RELEASE_VERSION}"
          echo "## vault-core ${RELEASE_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: ${RELEASE_MODE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm publication already existed: ${ALREADY_PUBLISHED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Git tag: ${TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Invariant: npm ⟺ tag ⟺ GitHub Release" >> "$GITHUB_STEP_SUMMARY"
