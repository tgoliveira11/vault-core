name: Validate vault-core

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require feature/fix/docs/chore branch prefix
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          case "$BRANCH" in
            feature/*|fix/*|docs/*|chore/*)
              echo "Branch prefix OK: $BRANCH"
              ;;
            *)
              echo "Branch '$BRANCH' must start with feature/, fix/, docs/, or chore/"
              exit 1
              ;;
          esac

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npm run validate

      - name: Verify crypto policy guard
        run: npm run verify:crypto-policy

      - name: Verify package contents
        run: npm pack --dry-run
